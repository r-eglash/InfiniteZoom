<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recursive Zoom</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:white;
}

object{
    width:100vw;
    height:100vh;
    display:block;
}
</style>

</head>

<body>

<object id="svg" data="drawing.svg" type="image/svg+xml"></object>

<script>

const FULL = {
    x:0,
    y:0,
    w:8192,
    h:8192
};

// Your recursive square
const TARGET = {
    x:4098.11-40.9998/2+10,
    y:4099.9701-40.9602/2+10,
    w:40.9998,
    h:40.9602
};

const SPEED = 0.001;      // smaller = slower

const obj=document.getElementById("svg");

obj.addEventListener("load",()=>{

    const svg=obj.contentDocument.querySelector("svg");

    let t=0;

    function animate(){

        t += SPEED;

        if (t >= 1) {
            t = 0;
        }

        // Constant perceived zoom speed
        const zoom = Math.pow(FULL.w / TARGET.w, t);

        const w = FULL.w / zoom;
        const h = FULL.h / zoom;

        const x = TARGET.x - (TARGET.x - FULL.x) / zoom;
        const y = TARGET.y - (TARGET.y - FULL.y) / zoom;

        svg.setAttribute(
            "viewBox",
            `${x} ${y} ${w} ${h}`
        );

        requestAnimationFrame(animate);

    }

    animate();

});

</script>

</body>
</html>

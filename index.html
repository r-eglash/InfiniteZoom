<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:white;
    width:100%;
    height:100%;
}

#viewer{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

img{
    transform-origin:center center;
    user-select:none;
    pointer-events:none;
}

</style>

</head>

<body>

<div id="viewer">

<img id="art" src="drawing.svg">

</div>

<script>

const art = document.getElementById("art");

let scale = 1;

function draw(){

    art.style.transform =
        `scale(${scale})`;

}

draw();

window.addEventListener("wheel",e=>{

    e.preventDefault();

    if(e.deltaY<0)
        scale*=1.03;
    else
        scale/=1.03;

    // Infinite recursion
    if(scale>=2)
        scale/=2;

    if(scale<1)
        scale*=2;

    draw();

},{passive:false});

</script>

</body>

</html>

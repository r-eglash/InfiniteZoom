<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Infinite Zoom</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:white;
}

#container{
    width:100vw;
    height:100vh;
    overflow:hidden;
    cursor:grab;
}

#container:active{
    cursor:grabbing;
}

svg{
    width:100%;
    height:100%;
}

</style>

</head>

<body>

<div id="container">

<object id="svgObject"
        data="drawing.svg"
        type="image/svg+xml"
        width="100%"
        height="100%">
</object>

</div>

<script>

const object=document.getElementById("svgObject");

object.addEventListener("load",()=>{

const svg=object.contentDocument.querySelector("svg");

let scale=1;

let x=4096;
let y=4096;

let dragging=false;

let lastX=0;
let lastY=0;

function update(){

    const size=8192/scale;

    svg.setAttribute(
        "viewBox",
        `${x-size/2} ${y-size/2} ${size} ${size}`
    );

}

update();

window.addEventListener("wheel",(e)=>{

    e.preventDefault();

    const zoom=e.deltaY<0?1.08:1/1.08;

    scale*=zoom;

    // fake infinite zoom

    if(scale>2){

        scale/=2;

    }

    if(scale<1){

        scale*=2;

    }

    update();

},{passive:false});

const container=document.getElementById("container");

container.addEventListener("mousedown",e=>{

    dragging=true;

    lastX=e.clientX;
    lastY=e.clientY;

});

window.addEventListener("mouseup",()=>{

    dragging=false;

});

window.addEventListener("mousemove",e=>{

    if(!dragging) return;

    const dx=e.clientX-lastX;
    const dy=e.clientY-lastY;

    lastX=e.clientX;
    lastY=e.clientY;

    x-=dx*(8192/scale)/window.innerWidth;
    y-=dy*(8192/scale)/window.innerHeight;

    update();

});

});

</script>

</body>
</html>
